# Rancher management UI — wave 0.
# Acceso SOLO via Tailscale: https://rancher.<TAILNET>.ts.net
# Reemplazar <TAILNET> con tu tailnet name (ej: "calibri" si el FQDN es calibri.ts.net).
# ingress.enabled=false: Traefik NO expone Rancher. Solo el LoadBalancer Tailscale lo hace.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rancher
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/BrianTuduri/calibri-infra.git
    targetRevision: main
    path: components/rancher/chart
    helm:
      releaseName: rancher
      values: |
        hostname: rancher.tailc13b86.ts.net
        replicas: 1
        bootstrapPassword: admin
        ingress:
          enabled: false
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 2Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: cattle-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# LoadBalancer Tailscale que expone Rancher SOLO en la VPN.
# Application separada del chart Helm: el chart no contiene este Service.
# El operador Tailscale (apps/tailscale.yaml) lo convierte en peer del tailnet.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rancher-lb
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/BrianTuduri/calibri-infra.git
    targetRevision: main
    path: components/rancher/base
  destination:
    server: https://kubernetes.default.svc
    namespace: cattle-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
