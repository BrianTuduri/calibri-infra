apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sonrisas
  namespace: argocd
  annotations:
    # Wave 2: la app es lo último. Espera a que postgres/redis/garage (wave 1)
    # estén Healthy. El deploy de la app vive acá; el código fuente, en sonrisasuy.
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/BrianTuduri/calibri-infra.git
    targetRevision: main
    path: components/sonrisas/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: sonrisas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
