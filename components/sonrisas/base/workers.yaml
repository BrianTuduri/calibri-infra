apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonrisas-sync-worker
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  # Keep replicas at 1: Dentalink API rate limit is shared per deployment.
  replicas: 1
  selector:
    matchLabels:
      app: sonrisas-sync-worker
  template:
    metadata:
      labels:
        app: sonrisas-sync-worker
    spec:
      terminationGracePeriodSeconds: 600
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/manuelgorospe/sonrisas-worker:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "packages/sync/dist/main.js"]
          envFrom:
            - secretRef:
                name: app-secrets
            - configMapRef:
                name: app-sync-config
          env:
            - name: PG_POOL_MAX
              # Bumped for backfill. Bajar a "8" cuando termine — ver gitops/pasos-manuales.md.
              value: "12"
            - name: UV_THREADPOOL_SIZE
              value: "12"
            - name: NODE_OPTIONS
              # Heap 1GB para backfill. Bajar a "--max-old-space-size=512" cuando termine.
              value: "--max-old-space-size=1024"
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu: 500m
              memory: 768Mi
            limits:
              cpu: "2"
              memory: 1536Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - |
                  const net = require("net");
                  const u = new URL(process.env.REDIS_URL);
                  const s = net.connect({ host: u.hostname, port: Number(u.port || 6379) });
                  const t = setTimeout(() => { s.destroy(); process.exit(1); }, 3000);
                  s.once("connect", () => { clearTimeout(t); s.end(); process.exit(0); });
                  s.once("error", () => { clearTimeout(t); process.exit(1); });
            periodSeconds: 60
            initialDelaySeconds: 60
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sonrisas-sync
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app: sonrisas-sync-worker
---
