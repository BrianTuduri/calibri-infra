apiVersion: v1
kind: Service
metadata:
  name: sonrisas-web
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: sonrisas-web
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonrisas-web
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sonrisas-web
  template:
    metadata:
      labels:
        app: sonrisas-web
    spec:
      terminationGracePeriodSeconds: 60
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/calabri1/sonrisas-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: app-secrets
            - configMapRef:
                name: app-sync-config
          env:
            - name: PG_POOL_MAX
              value: "10"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=768"
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: "1500m"
              memory: 1024Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health/live
              port: http
            failureThreshold: 30
            periodSeconds: 2
          volumeMounts:
            - name: next-cache
              mountPath: /app/apps/web/.next/cache
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: next-cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sonrisas-web
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: sonrisas-web
