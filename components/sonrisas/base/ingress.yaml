# Traefik Ingress + cert-manager TLS
# Reemplazar sonrisas.calabri.net con el dominio real antes del primer sync.
# Requiere cert-manager + ClusterIssuer "letsencrypt-prod" en el cluster.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sonrisas-web
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - sonrisas.calabri.net
      secretName: sonrisas-tls
  rules:
    - host: sonrisas.calabri.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sonrisas-web
                port:
                  name: http
