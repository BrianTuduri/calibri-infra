# Traefik Ingress sirviendo TLS desde el cert wildcard *.calabri.net.
# NO lleva anotacion cert-manager.io/cluster-issuer: el cert lo emite el
# Certificate wildcard (certificate.yaml), no se emite uno por host.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sonrisas-web
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - sonrisas.calabri.net
      secretName: wildcard-calabri-tls
  rules:
    - host: sonrisas.calabri.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sonrisas-web
                port:
                  name: http
