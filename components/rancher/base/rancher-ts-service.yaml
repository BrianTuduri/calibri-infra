# LoadBalancer Tailscale para Rancher.
# El operador crea un peer "rancher" en el tailnet — invisible desde internet.
# Acceso: https://rancher.<TAILNET>.ts.net (cert self-signed de Rancher, aceptar una vez).
apiVersion: v1
kind: Service
metadata:
  name: rancher-tailscale
  namespace: cattle-system
  annotations:
    tailscale.com/hostname: "rancher"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app: rancher
  ports:
    - name: https
      port: 443
      targetPort: 443
