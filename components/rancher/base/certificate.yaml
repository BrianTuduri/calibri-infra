# TLS para rancher.calabri.net.
# secretName fijo: el chart de Rancher espera "tls-rancher-ingress" en cattle-system
# cuando ingress.tls.source=secret. Mismo patron que sonrisas/base/certificate.yaml.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rancher-tls
  namespace: cattle-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  secretName: tls-rancher-ingress
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - rancher.calabri.net
